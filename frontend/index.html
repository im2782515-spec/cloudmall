<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>قاموسي</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
body { font-family: Arial; text-align:center; padding:40px; background:#f5f5f5; }
input { padding:12px; width:80%; margin:10px; }
button { padding:12px 20px; margin:10px; border:none; border-radius:8px; font-size:16px; cursor:pointer; }
button.login { background:#4CAF50; color:white; }
button.pay { background:#673ab7; color:white; }
#result { font-size:22px; margin-top:20px; }
#user { margin-top:20px; font-weight:bold; }
</style>
</head>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="script.js"></script>
<body>

<h2>📘 القاموس</h2>

<button class="login" onclick="login()">Login Pi</button>
<br>
<button class="pay" onclick="pay()">ادفع 1 Pi</button>
<br><br>

<input id="search" placeholder="اكتب كلمة">
<button onclick="find()">بحث</button>
<h3 id="result"></h3>

<p id="user"></p>

<script>

/* ===== Pi SDK Initialization ===== */
Pi.init({ 
  version: "2.0", 
  sandbox: true,
  apiKey: "fkjojkkpa9wgrhwh969t1fhv34yjskkhdvynndcqr2xhyep44s7ydkmnsa7ndlui"
});

/* ===== LOGIN ===== */
async function login() {
  try {
    const scopes = ['username','payments'];
    const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
    currentUser = auth.user;
    document.getElementById("user").innerText =
      "مرحبا " + auth.user.username;
  } catch (err) {
    alert("خطأ في تسجيل الدخول");
    console.log(err);
  }
}

/* ===== PAYMENT ===== */
function pay() {
  if (!currentUser) {
    alert("سجل دخول الاول");
    return;
  }
  const paymentData = {
    amount: 1,
    memo: "Unlock dictionary",
    metadata: { item: "dictionary" }
  };
  const callbacks = {
  onReadyForServerApproval: async (paymentId) => {
    try {
      await fetch("/api/approve", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ paymentId })
      });
    } catch(e){
      console.log(e);
    }
  },

  onReadyForServerCompletion: (paymentId, txid) => {
    console.log(paymentId, txid);
  },

  onCancel: () => {
    alert("تم الغاء الدفع");
  },

  onError: (error) => {
    console.log(error);
  }
};
  Pi.createPayment(paymentData, callbacks);
}

function onIncompletePaymentFound(payment) {
  console.log(payment);
}

/* ===== SEARCH DICTIONARY ===== */
async function find(){
  const word = document.getElementById("search").value.trim();
  if(!word){ 
    document.getElementById("result").innerText = "اكتب كلمة أولاً"; 
    return; 
  }
  const snap = await db.collection("dictionary")
    .where("word","==", word)
    .get();
  if(snap.empty){
    document.getElementById("result").innerText = "الكلمة غير موجودة";
  } else {
    snap.forEach(doc => {
      document.getElementById("result").innerText = doc.data().meaning;
    });
  }
}
</script>

</body>
</html>
