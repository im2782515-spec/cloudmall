<button class="login" onclick="login()">Login Pi</button>
<p id="user"></p>

<button class="pay" onclick="pay()">ادفع 1 Pi</button>

<input id="search" placeholder="اكتب كلمة" disabled>
<button id="searchBtn" onclick="find()" disabled>بحث</button>

<h3 id="result"></h3>

<script>
let currentUser = null;
</scrasync function login(){
  const scopes = ['username','payments'];
  const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
  currentUser = auth.user;

  document.getElementById("user").innerText =
    "مرحبا " + auth.user.username;

  document.getElementById("search").disabled = false;
  document.getElementById("searchBtn").disabled = false;
}ifunction pay(){
  if(!currentUser){
    alert("سجل دخول الاول");
    return;
  }

  const paymentData = {
    amount:1,
    memo:"Unlock dictionary",
    metadata:{item:"dictionary"}
  };

  const callbacks = {
    onReadyForServerApproval: async (paymentId)=>{
      await fetch("/api/approve",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({paymentId})
      });
    },

    onReadyForServerCompletion: async (paymentId,txid)=>{
      await fetch("/api/complete",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({paymentId,txid})
      });
    },

    onCancel:()=>alert("تم الغاء الدفع"),
    onError:(err)=>console.log(err)
  };

  Pi.createPayment(paymentData,callbacks);
}pt>
